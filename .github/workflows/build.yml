name: Clipboard Manager Build
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v4 # clones your repo into the VM
            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libx11-dev libxfixes-dev xclip
            - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            - run: cmake --build build --config Release
            - name: Smoke test (Unix)
              if: runner.os != 'Windows'
              run: ./build/clipboard-manager --help
            - name: Smoke test (Windows)
              if: runner.os == 'Windows'
              run: .\build\Release\clipboard-manager.exe --help
