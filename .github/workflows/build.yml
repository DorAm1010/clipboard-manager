name: Clipboard Manager Build
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v4 # clones your repo into the VM
            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libx11-dev libxfixes-dev libxtst-dev libgtk-3-dev xclip xvfb
            - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            - run: cmake --build build --config Release
            # Run the CTest suite (currently the start/stop data-race regression
            # test). --build-config matches the multi-config generator on Windows;
            # --output-on-failure prints test logs only when something fails.
            - name: Test (ctest)
              run: ctest --test-dir build --build-config Release --output-on-failure
            - name: Smoke test (Unix)
              if: runner.os != 'Windows'
              run: ./build/clipboard-manager --help
            - name: Smoke test (Windows)
              if: runner.os == 'Windows'
              run: .\build\Release\clipboard-manager.exe --help
            # A successful build only proves the code compiles/links against
            # the dev headers — it doesn't prove the GTK/X11 runtime actually
            # works on a fresh runner. Start the daemon under a real (virtual)
            # X server and confirm it reaches "hotkey registered" without
            # crashing, then kill it. CI has no window manager, so this
            # can't exercise focus-mediated behavior (click-outside-dismiss)
            # the way the project's local Docker+Xvfb+openbox harness does —
            # it only proves the daemon starts cleanly at runtime.
            - name: Runtime smoke test (Linux, under Xvfb)
              if: runner.os == 'Linux'
              run: |
                  xvfb-run --auto-servernum ./build/clipboard-manager -d --foreground > daemon_smoke.log 2>&1 &
                  sleep 2
                  if ! grep -q "Registered" daemon_smoke.log; then
                      echo "Daemon did not report a registered hotkey:"
                      cat daemon_smoke.log
                      exit 1
                  fi
                  # pkill by pattern rather than tracking a PID directly: the
                  # backgrounded process is xvfb-run's own wrapper script, and
                  # a signal sent to that PID is not guaranteed to reach the
                  # actual clipboard-manager child it launches.
                  pkill -TERM -f "build/clipboard-manager -d --foreground"
                  sleep 1
                  cat daemon_smoke.log
