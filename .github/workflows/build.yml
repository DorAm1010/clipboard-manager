name: Clipboard Manager Build
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v4 # clones your repo into the VM
            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libx11-dev libxfixes-dev libxtst-dev libgtk-3-dev xclip xvfb
            - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            - run: cmake --build build --config Release
            # Run the CTest suite (currently the start/stop data-race regression
            # test). --build-config matches the multi-config generator on Windows;
            # --output-on-failure prints test logs only when something fails.
            - name: Test (ctest)
              run: ctest --test-dir build --build-config Release --output-on-failure
            - name: Smoke test (Unix)
              if: runner.os != 'Windows'
              run: ./build/clipboard-manager --help
            - name: Smoke test (Windows)
              if: runner.os == 'Windows'
              run: .\build\Release\clipboard-manager.exe --help
